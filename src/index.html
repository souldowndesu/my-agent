<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>双窗口并发 & 内存生命周期测试</title>
    <style>
        body { font-family: sans-serif; background: #f0f2f5; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        .main-container { width: 900px; background: white; border-radius: 10px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); overflow: hidden; display: flex; flex-direction: column; height: 85vh; }
        .tabs { display: flex; background: #202123; color: white; cursor: pointer; }
        .tab { flex: 1; text-align: center; padding: 15px; font-weight: bold; opacity: 0.6; transition: 0.3s; }
        .tab.active { opacity: 1; background: #343541; border-bottom: 3px solid #10a37f; }
        .controls { padding: 10px 20px; background: #f7f7f8; display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid #ddd; }
        .status-badge { padding: 4px 10px; border-radius: 12px; font-size: 12px; font-weight: bold; background: #dc2626; color: white; }
        .status-badge.connected { background: #16a34a; }
        .chat-area { flex: 1; padding: 20px; overflow-y: auto; display: flex; flex-direction: column; gap: 15px; background: white; }
        .message { max-width: 80%; padding: 10px 15px; border-radius: 8px; line-height: 1.5; font-size: 14px; white-space: pre-wrap; }
        .message.user { align-self: flex-end; background: #10a37f; color: white; }
        .message.bot { align-self: flex-start; background: #f7f7f8; border: 1px solid #e5e7eb; }
        .input-area { display: flex; padding: 15px; background: #fff; border-top: 1px solid #eee; }
        input[type="text"] { flex: 1; padding: 10px; border: 1px solid #ddd; border-radius: 5px; outline: none; }
        button { padding: 10px 20px; border: none; border-radius: 5px; cursor: pointer; color: white; margin-left: 10px; font-weight: bold; }
        .btn-send { background: #10a37f; }
        .btn-send:disabled { background: #9ca3af; cursor: not-allowed; }
        .btn-connect { background: #2563eb; }
        .btn-disconnect { background: #dc2626; }
        .session-id { font-size: 13px; color: #666; margin-left: 10px; }
        .window { display: none; flex-direction: column; height: 100%; }
        .window.active { display: flex; }
    </style>
</head>
<body>

<div class="main-container">
    <div class="tabs">
        <div class="tab active" onclick="switchTab('A')">对话窗口 A (Session A)</div>
        <div class="tab" onclick="switchTab('B')">对话窗口 B (Session B)</div>
    </div>

    <div id="window_A" class="window active">
        <div class="controls">
            <div>
                <span class="status-badge" id="status_A">未连接</span>
                <span class="session-id">ID: session_A</span>
            </div>
            <div>
                <button class="btn-connect" onclick="connectSSE('A')">连接对话</button>
                <button class="btn-disconnect" onclick="disconnectSSE('A')">断开保存并释放</button>
            </div>
        </div>
        <div class="chat-area" id="chat_A"></div>
        <div class="input-area">
            <input type="text" id="input_A" placeholder="输入消息 (需先建立连接)..." autocomplete="off">
            <button class="btn-send" id="btn_A" onclick="sendMessage('A')">发送</button>
        </div>
    </div>

    <div id="window_B" class="window">
        <div class="controls">
            <div>
                <span class="status-badge" id="status_B">未连接</span>
                <span class="session-id">ID: session_B</span>
            </div>
            <div>
                <button class="btn-connect" onclick="connectSSE('B')">连接对话</button>
                <button class="btn-disconnect" onclick="disconnectSSE('B')">断开保存并释放</button>
            </div>
        </div>
        <div class="chat-area" id="chat_B"></div>
        <div class="input-area">
            <input type="text" id="input_B" placeholder="输入消息 (需先建立连接)..." autocomplete="off">
            <button class="btn-send" id="btn_B" onclick="sendMessage('B')">发送</button>
        </div>
    </div>
</div>

<script>
    const baseUrl = "http://127.0.0.1:8001";
    
    // 管理两个窗口的状态
    const sessions = {
        'A': { id: 'session_A', es: null, currentBotMsg: null },
        'B': { id: 'session_B', es: null, currentBotMsg: null }
    };

    function switchTab(target) {
        document.querySelectorAll('.tab').forEach((el, index) => {
            el.className = 'tab' + (target === (index===0?'A':'B') ? ' active' : '');
        });
        document.getElementById('window_A').className = 'window' + (target === 'A' ? ' active' : '');
        document.getElementById('window_B').className = 'window' + (target === 'B' ? ' active' : '');
    }

    function updateStatus(win, isConnected) {
        const badge = document.getElementById(`status_${win}`);
        const input = document.getElementById(`input_${win}`);
        if (isConnected) {
            badge.textContent = "已连接";
            badge.className = "status-badge connected";
        } else {
            badge.textContent = "未连接";
            badge.className = "status-badge";
        }
    }

    function appendMessage(win, text, sender) {
        const chatArea = document.getElementById(`chat_${win}`);
        const msgDiv = document.createElement('div');
        msgDiv.className = `message ${sender}`;
        msgDiv.textContent = text;
        chatArea.appendChild(msgDiv);
        chatArea.scrollTop = chatArea.scrollHeight;
        return msgDiv;
    }

    function connectSSE(win) {
        if (sessions[win].es) {
            alert("该窗口已经处于连接状态！");
            return;
        }
        
        const es = new EventSource(`${baseUrl}/stream/${sessions[win].id}`);
        sessions[win].es = es;
        updateStatus(win, true);

        es.onmessage = (event) => {
            const data = JSON.parse(event.data);
            if (data.event === "start") {
                sessions[win].currentBotMsg = appendMessage(win, "", "bot");
            } else if (data.event === "content" && sessions[win].currentBotMsg) {
                sessions[win].currentBotMsg.textContent += data.data;
                document.getElementById(`chat_${win}`).scrollTop = document.getElementById(`chat_${win}`).scrollHeight;
            } else if (data.event === "end" || data.event === "error") {
                if(data.event === "error") appendMessage(win, `[Error]: ${data.error_msg}`, "bot");
                sessions[win].currentBotMsg = null;
                document.getElementById(`btn_${win}`).disabled = false;
            }
        };

        es.onerror = () => {
            updateStatus(win, false);
            sessions[win].currentBotMsg = null;
            document.getElementById(`btn_${win}`).disabled = false;
            es.close();
            sessions[win].es = null;
        };
    }

    function disconnectSSE(win) {
        if (sessions[win].es) {
            sessions[win].es.close(); // 这会主动断开 HTTP 连接，触发后端 finally 块
            sessions[win].es = null;
            sessions[win].currentBotMsg = null;
            document.getElementById(`btn_${win}`).disabled = false;
            updateStatus(win, false);
            appendMessage(win, "--- [系统]: SSE 连接已断开，后端应已执行保存 ---", "bot");
        }
    }

    async function sendMessage(win) {
        if (!sessions[win].es) {
            alert("请先点击『连接对话』建立 SSE 连接！");
            return;
        }

        const inputEl = document.getElementById(`input_${win}`);
        const btnEl = document.getElementById(`btn_${win}`);
        const text = inputEl.value.trim();
        if (!text) return;

        appendMessage(win, text, "user");
        inputEl.value = "";
        btnEl.disabled = true;

        try {
            const response = await fetch(`${baseUrl}/str-input/${sessions[win].id}?user_input=${encodeURIComponent(text)}`, { method: "POST" });
            if (!response.ok) throw new Error("HTTP 错误");
        } catch (e) {
            appendMessage(win, "网络请求失败，请检查后端是否运行。", "bot");
            btnEl.disabled = false;
        }
    }
</script>

</body>
</html>
