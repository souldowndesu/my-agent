<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LLM Chat UI</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="app-container">
        <aside class="sidebar">
            <div class="sidebar-actions">
                <button id="new-chat-btn" class="primary-btn">+ 新建临时对话</button>
                <button id="clean-temp-btn" class="secondary-btn" disabled>🧹 清理临时对话</button>
            </div>
            <div class="chat-list-container">
                <ul id="chat-list">
                    </ul>
            </div>
        </aside>

        <main class="chat-area">
            <div id="chat-header" class="chat-header">
                <h2 id="current-session-title">⭐ 主对话</h2>
                <div class="chat-header-actions">
                    <button id="connection-toggle-btn" class="connection-toggle-btn" title="控制当前会话的SSE连接">🔗 已连接</button>
                    <button id="compact-btn" class="compact-trigger-btn" title="压缩当前主会话的记忆">🧠 压缩记忆</button>
                </div>
            </div>
            
            <div id="compact-panel" class="compact-panel">
                <div class="compact-panel-header">
                    <span>🧠 记忆压缩</span>
                    <span id="compact-status" class="compact-status">等待中...</span>
                </div>
                <div id="compact-content" class="compact-content"></div>
            </div>

            <div id="messages-container" class="messages-container">
                </div>

            <div class="input-area">
                <div class="input-area-container">
                    <div class="input-row">
                        <input type="text" id="message-input" placeholder="输入你的问题..." disabled autocomplete="off" data-lpignore="true">
                        <button id="send-btn" disabled>发送</button>
                    </div>
                    <div id="follow-up-hint" class="follow-up-hint"></div>
                </div>
            </div>
        </main>
    </div>

    <!-- JS 模块（按依赖顺序加载） -->
    <script src="js/config.js"></script>
    <script src="js/state.js"></script>
    <script src="js/utils.js"></script>
    <script src="js/message-bubble.js"></script>
    <script src="js/chat-list.js"></script>
    <script src="js/session-switch.js"></script>
    <script src="js/sse-client.js"></script>
    <script src="js/message-send.js"></script>
    <script src="js/compact.js"></script>
    <script src="js/ui.js"></script>
    <script src="js/main.js"></script>
</body>
</html>
